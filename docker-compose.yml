services:
  mock-interview-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-interview-backend
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${PORT:-5050}:5050"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      TRUST_PROXY: 1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5050/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
