<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模拟面试平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Lobby View -->
        <div id="lobby-view" class="view-container active">
            <div class="glass-panel lobby-panel">
                <h1>AI 模拟面试</h1>
                <p class="subtitle">沉浸式数字人面试体验</p>
                
                <div class="form-group">
                    <label for="candidate-name">你的名字</label>
                    <input type="text" id="candidate-name" placeholder="请输入你的名字" value="测试候选人">
                </div>
                
                <div class="form-group">
                    <label for="document-select">选择面试题库</label>
                    <select id="document-select">
                        <option value="">加载中...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="question-count">连问题数</label>
                    <input type="number" id="question-count" value="3" min="1" max="10">
                </div>

                <button id="start-btn" class="primary-btn pulse-on-hover">开始面试</button>
            </div>
        </div>

        <!-- Interview Room View -->
        <div id="interview-view" class="view-container hidden">
            <div class="header">
                <h2>当前进度: <span id="progress-text">1/3</span></h2>
                <button id="quit-btn" class="secondary-btn">结束面试</button>
            </div>
            
            <div class="main-content">
                <div class="video-container glass-panel">
                    <div id="video-placeholder" class="placeholder">
                        <div class="spinner"></div>
                        <p>面试官加载中...</p>
                    </div>
                    <!-- The video player -->
                    <video id="interviewer-video" playsinline></video>
                </div>
                
                <div class="controls-panel glass-panel">
                    <div id="question-text" class="question-text">准备好后，面试官将开始提问...</div>
                    <div class="status-indicator">
                        <div id="recording-indicator" class="recording-dot hidden"></div>
                        <span id="interaction-status">请听题...</span>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="record-btn" class="primary-btn record-btn hidden" disabled>
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                            开始回答
                        </button>
                        <button id="submit-answer-btn" class="secondary-btn hidden">提交回答并进入下一题</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Dashboard View -->
        <div id="result-view" class="view-container hidden">
            <div class="header">
                <h2>面试报告</h2>
                <button id="back-home-btn" class="primary-btn">返回首页</button>
            </div>
            <div id="results-container" class="results-container">
                <!-- Results will be injected here dynamically -->
                <div class="spinner global-spinner"></div>
                <p style="text-align: center; margin-top: 1rem;">正在生成面试报告，请稍候...</p>
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
